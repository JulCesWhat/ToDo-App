service: todo-api

frameworkVersion: '4'

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    TODOS_TABLE: ${self:service}-${sls:stage}-todos
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - !GetAtt TodosTable.Arn

functions:
  createTodo:
    handler: src/todos/create.handler
    events:
      - http:
          method: POST
          path: todos
          cors: true

  listTodos:
    handler: src/todos/list.handler
    events:
      - http:
          method: GET
          path: todos
          cors: true

  getTodo:
    handler: src/todos/get.handler
    events:
      - http:
          method: GET
          path: todos/{id}
          cors: true

  updateTodo:
    handler: src/todos/update.handler
    events:
      - http:
          method: PUT
          path: todos/{id}
          cors: true

  deleteTodo:
    handler: src/todos/delete.handler
    events:
      - http:
          method: DELETE
          path: todos/{id}
          cors: true

resources:
  Resources:
    TodosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TODOS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
