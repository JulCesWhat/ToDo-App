service: todo-api

frameworkVersion: '4'

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: true
    platform: node
    target: node20
    exclude:
      - '@aws-sdk/*'
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    TODOS_TABLE: ${self:service}-${sls:stage}-todos
    USER_POOL_ID: !Ref CognitoUserPool
    USER_POOL_CLIENT_ID: !Ref CognitoUserPoolClient
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - !GetAtt TodosTable.Arn

functions: ${file(functions/todos.yml)}

resources:
  - Resources:
      ${file(resources/cognito.yml)}
  - Resources:
      ${file(resources/dynamodb.yml)}
  - Outputs:
      UserPoolId:
        Value: !Ref CognitoUserPool
      UserPoolClientId:
        Value: !Ref CognitoUserPoolClient
