# DynamoDB table for storing user todos
# Uses a composite key to scope data per user:
#   - userId (HASH): from Cognito JWT claims.sub
#   - id (RANGE): unique todo ID (UUID)
TodosTable:
  Type: AWS::DynamoDB::Table
  DeletionPolicy: Retain
  Properties:
    TableName: ${self:provider.environment.TODOS_TABLE}
    BillingMode: PAY_PER_REQUEST  # scales automatically, no capacity planning
    AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      - AttributeName: id
        AttributeType: S
    KeySchema:
      - AttributeName: userId
        KeyType: HASH   # partition key — enables Query by user
      - AttributeName: id
        KeyType: RANGE  # sort key — unique todo within a user
